<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taboo Games | SoCal RetroGaming Expo 2026</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #111;
      color: #f5f5f5;
    }
    .hero {
      padding: 80px 0;
      text-align: center;
    }
    .brand {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .content-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="hero">
    <div class="container">
      <div class="brand">TABOO GAMES</div>
      <p class="lead mt-3">For Retro Game Collectors</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="content-box text-center">

      <h1 class="mb-4">SoCal RetroGaming Expo 2026</h1>

      <p class="mb-4">
        We will be selling off a private retro game collection.
      </p>

      <div class="text-start d-inline-block">
        <ul class="list-group list-group-flush">
          <li class="list-group-item bg-transparent text-light">200+ Loose SNES Games</li>
          <li class="list-group-item bg-transparent text-light">100+ Complete in Box Switch Games</li>
          <li class="list-group-item bg-transparent text-light">50+ Complete in Box Super Famicom Games</li>
          <li class="list-group-item bg-transparent text-light">Gaming Statues</li>
          <li class="list-group-item bg-transparent text-light">Retro Consoles</li>
        </ul>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center mt-5 mb-3 text-secondary">
    <small>&copy; 2026 Taboo Games</small>
  </footer>

</body>
</html>
